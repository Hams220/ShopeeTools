<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Input Shopee</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
      body {
        background-color: #0f172a;
        color: #e5e7eb;
        font-family: 'Inter', sans-serif;
      }

      h1, h2, h3, h4, h5 {
        font-family: 'Poppins', sans-serif;
      }

      /* Navbar styling */
      .navbar-custom {
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255,255,255,0.1);
      }

      .navbar-brand {
        font-weight: 600;
        font-family: 'Poppins', sans-serif;
        color: #fff !important;
      }

      .nav-link {
        color: #cbd5f5 !important;
        transition: 0.3s;
      }

      .nav-link:hover {
        color: #fff !important;
      }

      /* Card styling */
      .card-dark {
        background: #1e293b;
        border: none;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      }

      /* Horizontal scroll container for mobile */
      .stats-scroll {
        display: flex;
        gap: 1rem;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        -ms-overflow-style: none;
        padding-bottom: 0.5rem;
      }

      .stats-scroll::-webkit-scrollbar {
        display: none;
      }

      .stat-card {
        min-width: 140px;
        flex: 0 0 auto;
        scroll-snap-align: start;
      }

      /* Desktop: normal grid */
      @media (min-width: 768px) {
        .stats-scroll {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          overflow-x: visible;
        }
        .stat-card {
          min-width: auto;
        }
      }

      /* Search styling */
      .search-container {
        position: relative;
      }

      .search-input {
        background: #1e293b;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 12px 16px 12px 45px;
        color: #fff;
        width: 100%;
      }

      .search-input:focus {
        outline: none;
        border-color: #3b82f6;
        background: #1e293b;
        color: #fff;
      }

      .search-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
      }

      .btn-search {
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        border: none;
        border-radius: 12px;
        padding: 12px 24px;
        color: white;
        font-weight: 500;
        transition: all 0.3s ease;
      }

      .btn-search:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        color: white;
      }

      /* Data card styling */
      .data-card {
        background: #1e293b;
        border: 1px solid rgba(255,255,255,0.05);
        border-radius: 16px;
        padding: 1.25rem;
        margin-bottom: 1rem;
        transition: all 0.3s ease;
        animation: fadeIn 0.5s ease;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .data-card:hover {
        border-color: rgba(255,255,255,0.1);
        transform: translateY(-2px);
      }

      .data-label {
        color: #94a3b8;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 0.25rem;
      }

      .data-value {
        color: #fff;
        font-weight: 500;
        font-size: 0.95rem;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        border-radius: 20px;
        font-size: 0.875rem;
        font-weight: 500;
      }

      .status-success {
        background: rgba(34, 197, 94, 0.15);
        color: #22c55e;
      }

      .status-pending {
        background: rgba(245, 158, 11, 0.15);
        color: #f59e0b;
      }

      .status-dikirim {
        background: rgba(59, 130, 246, 0.15);
        color: #3b82f6;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
      }

      .btn-action {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        border: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        cursor: pointer;
      }

      .btn-edit {
        background: rgba(59, 130, 246, 0.15);
        color: #3b82f6;
      }

      .btn-edit:hover {
        background: rgba(59, 130, 246, 0.25);
        transform: scale(1.05);
      }

      .btn-delete {
        background: rgba(239, 68, 68, 0.15);
        color: #ef4444;
      }

      .btn-delete:hover {
        background: rgba(239, 68, 68, 0.25);
        transform: scale(1.05);
      }

      .btn-track {
        background: rgba(139, 92, 246, 0.15);
        color: #8b5cf6;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 10px;
        font-size: 0.875rem;
        font-weight: 500;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }

      .btn-track:hover {
        background: rgba(139, 92, 246, 0.25);
        color: #8b5cf6;
        transform: translateY(-1px);
      }

      .section-title {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
        color: #fff;
      }

      .empty-state {
        text-align: center;
        padding: 3rem 1rem;
        color: #64748b;
      }

      .empty-state i {
        font-size: 3rem;
        margin-bottom: 1rem;
        color: #475569;
      }

      /* Modal Styling */
      .modal-content {
        background: #1e293b;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        color: #fff;
      }

      .modal-header {
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding: 1.5rem;
      }

      .modal-title {
        font-family: 'Poppins', sans-serif;
        font-weight: 600;
      }

      .modal-body {
        padding: 1.5rem;
      }

      .modal-footer {
        border-top: 1px solid rgba(255,255,255,0.1);
        padding: 1.5rem;
      }

      .form-label {
        color: #94a3b8;
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 0.5rem;
      }

      .form-control, .form-select {
        background: #0f172a;
        border: 1px solid rgba(255,255,255,0.1);
        color: #fff;
        border-radius: 12px;
        padding: 0.75rem 1rem;
      }

      .form-control:focus, .form-select:focus {
        background: #0f172a;
        border-color: #3b82f6;
        color: #fff;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      .btn-close {
        filter: invert(1);
      }

      .btn-save {
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        border: none;
        border-radius: 12px;
        padding: 0.75rem 1.5rem;
        color: white;
        font-weight: 500;
      }

      .btn-save:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        color: white;
      }

      .btn-cancel {
        background: rgba(255,255,255,0.1);
        border: none;
        border-radius: 12px;
        padding: 0.75rem 1.5rem;
        color: #fff;
        font-weight: 500;
      }

      .btn-cancel:hover {
        background: rgba(255,255,255,0.15);
        color: #fff;
      }

      /* Toast Notification */
      .toast-container {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
      }

      .toast-custom {
        background: #1e293b;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        color: #fff;
        padding: 1rem 1.5rem;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }

      .loading-skeleton {
        background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
        background-size: 200% 100%;
        animation: loading 1.5s infinite;
        border-radius: 12px;
        height: 120px;
        margin-bottom: 1rem;
      }

      @keyframes loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
    </style>
  </head>
  <body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom px-4">
      <a class="navbar-brand" href="#">ShopeeTools</a>

      <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        ☰
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav gap-3">
          <li class="nav-item">
            <a class="nav-link" href="#">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="input.html">Input</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="scan.html">scan</a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Welcome Card -->
    <div class="container py-3">
      <div class="card card-dark p-4 text-white">
        <h3 class="mb-3">Welcome 👋</h3>
        <p class="mb-0 text-secondary">Kelola data pesanan Shopee Anda dengan mudah. Data realtime dari Firebase.</p>
      </div>
    </div>

    <!-- Stats Cards - Horizontal Scroll Mobile -->
    <div class="container py-3">
      <div class="stats-scroll" id="statsContainer">
        <!-- Stats akan diisi oleh JavaScript -->
        <div class="stat-card card card-dark p-4">
          <h6 class="text-secondary mb-2" style="font-size: 0.875rem;">Total Transaksi</h6>
          <h2 class="fw-bold text-info mb-0" id="totalTransaksi">-</h2>
        </div>

        <div class="stat-card card card-dark p-4">
          <h6 class="text-secondary mb-2" style="font-size: 0.875rem;">Pesanan Selesai</h6>
          <h2 class="fw-bold text-success mb-0" id="totalSelesai">-</h2>
        </div>

        <div class="stat-card card card-dark p-4">
          <h6 class="text-secondary mb-2" style="font-size: 0.875rem;">Dalam Proses</h6>
          <h2 class="fw-bold text-warning mb-0" id="totalProses">-</h2>
        </div>
      </div>
    </div>

    <!-- Search Section -->
    <div class="container py-3">
      <h4 class="section-title">Cari Data</h4>
      <div class="row g-3">
        <div class="col-12 col-md-9">
          <div class="search-container">
            <i class="bi bi-search search-icon"></i>
            <input type="text" class="search-input" id="searchInput" placeholder="Cari nama produk, no resi, atau no pesanan...">
          </div>
        </div>
        <div class="col-12 col-md-3">
          <button class="btn-search w-100" onclick="searchData()">
            <i class="bi bi-search me-2"></i>Search
          </button>
        </div>
      </div>
    </div>

    <!-- Data Cards Section -->
    <div class="container py-3 pb-5">
      <h4 class="section-title">Data Pesanan</h4>

      <!-- Loading State -->
      <div id="loadingState">
        <div class="loading-skeleton"></div>
        <div class="loading-skeleton"></div>
        <div class="loading-skeleton"></div>
      </div>

      <!-- Data Container -->
      <div id="daftarPaket" style="display: none;"></div>

      <!-- Empty State -->
      <div id="emptyState" class="empty-state" style="display: none;">
        <i class="bi bi-inbox"></i>
        <h5>Belum ada data</h5>
        <p>Data pesanan akan muncul di sini</p>
      </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">
              <i class="bi bi-pencil-square me-2"></i>Edit Data Pesanan
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="editForm">
              <input type="hidden" id="editId">

              <div class="mb-3">
                <label class="form-label">Nama Produk</label>
                <input type="text" class="form-control" id="editNama" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Harga</label>
                <input type="number" class="form-control" id="editHarga" required>
              </div>

              <div class="mb-3">
                <label class="form-label">No Resi</label>
                <input type="text" class="form-control" id="editNoRes">
              </div>

              <div class="mb-3">
                <label class="form-label">No Pesanan</label>
                <input type="text" class="form-control" id="editNoPesanan">
              </div>

              <div class="mb-3">
                <label class="form-label">Status</label>
                <select class="form-select" id="editStatus">
                  <option value="Pending">⏳ Pending</option>
                  <option value="Dikirim">🚚 Dikirim</option>
                  <option value="Selesai">✅ Selesai</option>
                  <option value="Dibatalkan">❌ Dibatalkan</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label">Tanggal Pesan</label>
                <input type="date" class="form-control" id="editTanggal">
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn-cancel" data-bs-dismiss="modal">Batal</button>
            <button type="button" class="btn-save" onclick="saveEdit()">
              <i class="bi bi-check-lg me-2"></i>Simpan Perubahan
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      const url = "https://hams-71af2-default-rtdb.firebaseio.com/data/paket.json";
      let allData = {}; // Store all data for search functionality
      let editModal;

      // Initialize modal
      document.addEventListener('DOMContentLoaded', function() {
        editModal = new bootstrap.Modal(document.getElementById('editModal'));
        loadData();
      });

      function formatRupiah(angka) {
        if (!angka) return "Rp 0";
        return "Rp " + Number(angka).toLocaleString("id-ID");
      }

      function formatTanggal(tanggal) {
        if (!tanggal) return "-";
        const d = new Date(tanggal);
        if (isNaN(d.getTime())) return tanggal;
        return d.toLocaleDateString("id-ID", {
          day: "2-digit",
          month: "short",
          year: "numeric"
        });
      }

      function getStatusClass(status) {
        const statusLower = (status || "").toLowerCase();
        if (statusLower === "selesai") return "status-success";
        if (statusLower === "dikirim") return "status-dikirim";
        if (statusLower === "pending") return "status-pending";
        return "status-pending";
      }

      function showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toastId = 'toast-' + Date.now();

        const bgColor = type === 'success' ? '#22c55e' : '#ef4444';
        const icon = type === 'success' ? 'bi-check-circle' : 'bi-x-circle';

        const toastHtml = `
          <div class="toast-custom mb-2" id="${toastId}" style="border-left: 4px solid ${bgColor};">
            <div class="d-flex align-items-center">
              <i class="bi ${icon} me-2" style="color: ${bgColor};"></i>
              <span>${message}</span>
            </div>
          </div>
        `;

        container.insertAdjacentHTML('beforeend', toastHtml);

        setTimeout(() => {
          const toast = document.getElementById(toastId);
          if (toast) {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(100%)';
            toast.style.transition = 'all 0.3s ease';
            setTimeout(() => toast.remove(), 300);
          }
        }, 3000);
      }

      function updateStats(data) {
        if (!data) {
          document.getElementById('totalTransaksi').textContent = '0';
          document.getElementById('totalSelesai').textContent = '0';
          document.getElementById('totalProses').textContent = '0';
          return;
        }

        const items = Object.values(data);
        const total = items.length;
        const selesai = items.filter(item =>
          (item.status_pesanan || "").toLowerCase() === "selesai"
        ).length;
        const proses = items.filter(item => {
          const status = (item.status_pesanan || "").toLowerCase();
          return status === "dikirim" || status === "pending";
        }).length;

        // Animate numbers
        animateNumber('totalTransaksi', total);
        animateNumber('totalSelesai', selesai);
        animateNumber('totalProses', proses);
      }

      function animateNumber(elementId, target) {
        const element = document.getElementById(elementId);
        const start = parseInt(element.textContent) || 0;
        const duration = 500;
        const startTime = performance.now();

        function update(currentTime) {
          const elapsed = currentTime - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const easeProgress = 1 - Math.pow(1 - progress, 3); // easeOutCubic
          const current = Math.floor(start + (target - start) * easeProgress);

          element.textContent = current;

          if (progress < 1) {
            requestAnimationFrame(update);
          }
        }

        requestAnimationFrame(update);
      }

      function loadData() {
        document.getElementById('loadingState').style.display = 'block';
        document.getElementById('daftarPaket').style.display = 'none';
        document.getElementById('emptyState').style.display = 'none';

        fetch(url)
          .then(res => res.json())
          .then(data => {
            allData = data || {};
            document.getElementById('loadingState').style.display = 'none';

            updateStats(data);

            if (!data || Object.keys(data).length === 0) {
              document.getElementById('emptyState').style.display = 'block';
              return;
            }

            renderData(data);
            document.getElementById('daftarPaket').style.display = 'block';
          })
          .catch(err => {
            console.error(err);
            document.getElementById('loadingState').style.display = 'none';
            showToast('Gagal memuat data', 'error');
          });
      }

      function renderData(data, searchTerm = '') {
        const container = document.getElementById("daftarPaket");
        container.innerHTML = "";

        let keys = Object.keys(data);

        // Filter if search term exists
        if (searchTerm) {
          const term = searchTerm.toLowerCase();
          keys = keys.filter(key => {
            const item = data[key];
            return (
              (item.nama_data || '').toLowerCase().includes(term) ||
              (item.no_res || '').toLowerCase().includes(term) ||
              (item.no_pesanan || '').toLowerCase().includes(term)
            );
          });
        }

        // Sort by newest first (assuming keys are timestamps or use timestamp field)
        keys.reverse();

        if (keys.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="bi bi-search"></i>
              <h5>Tidak ada hasil</h5>
              <p>Coba kata kunci lain</p>
            </div>
          `;
          return;
        }

        keys.forEach((key, index) => {
          const item = data[key];

          const html = `
            <div class="data-card" style="animation-delay: ${index * 0.1}s">
              <div class="row g-3">
                <div class="col-6 col-md-2">
                  <div class="data-label">Nama Produk</div>
                  <div class="data-value">${item.nama_data || "-"}</div>
                </div>

                <div class="col-6 col-md-2">
                  <div class="data-label">Harga</div>
                  <div class="data-value text-success">${formatRupiah(item.harga_data)}</div>
                </div>

                <div class="col-6 col-md-2">
                  <div class="data-label">No Resi</div>
                  <div class="data-value font-monospace">${item.no_res || "-"}</div>
                </div>

                <div class="col-6 col-md-2">
                  <div class="data-label">No Pesanan</div>
                  <div class="data-value font-monospace">${item.no_pesanan || "-"}</div>
                </div>

                <div class="col-6 col-md-2">
                  <div class="data-label">Status</div>
                  <span class="status-badge ${getStatusClass(item.status_pesanan)}">
                    <span class="status-dot"></span>
                    ${item.status_pesanan || "-"}
                  </span>
                </div>

                <div class="col-6 col-md-2">
                  <div class="data-label">Tanggal Pesan</div>
                  <div class="data-value">${formatTanggal(item.tanggal_pesan)}</div>
                </div>
              </div>

              <hr class="my-3" style="border-color: rgba(255,255,255,0.1);">

              <div class="d-flex gap-2 justify-content-end align-items-center">
                ${item.no_res ? `
                  <a href="https://spx.co.id/m/track?${item.no_res}" target="_blank" class="btn-track">
                    <i class="bi bi-truck"></i>Lacak
                  </a>
                ` : ''}

                <button class="btn-action btn-edit" onclick="editData('${key}')" title="Edit">
                  <i class="bi bi-pencil-fill"></i>
                </button>

                <button class="btn-action btn-delete" onclick="deleteData('${key}')" title="Hapus">
                  <i class="bi bi-trash-fill"></i>
                </button>
              </div>
            </div>
          `;

          container.innerHTML += html;
        });
      }

      function searchData() {
        const searchTerm = document.getElementById('searchInput').value;
        renderData(allData, searchTerm);
      }

      // Live search on input
      document.getElementById('searchInput')?.addEventListener('input', function(e) {
        renderData(allData, e.target.value);
      });

      function deleteData(id) {
        if (!confirm("Yakin mau hapus data ini? Data yang dihapus tidak bisa dikembalikan.")) {
          return;
        }

        fetch(`https://hams-71af2-default-rtdb.firebaseio.com/data/paket/${id}.json`, {
          method: "DELETE"
        })
        .then(() => {
          showToast('Data berhasil dihapus');
          loadData(); // Reload to update stats and list
        })
        .catch(err => {
          console.error(err);
          showToast('Gagal menghapus data', 'error');
        });
      }

      function editData(id) {
        const item = allData[id];
        if (!item) {
          showToast('Data tidak ditemukan', 'error');
          return;
        }

        // Fill form with existing data
        document.getElementById('editId').value = id;
        document.getElementById('editNama').value = item.nama_data || '';
        document.getElementById('editHarga').value = item.harga_data || '';
        document.getElementById('editNoRes').value = item.no_res || '';
        document.getElementById('editNoPesanan').value = item.no_pesanan || '';
        document.getElementById('editStatus').value = item.status_pesanan || 'Pending';
        document.getElementById('editTanggal').value = item.tanggal_pesan || '';

        // Show modal
        editModal.show();
      }

      function saveEdit() {
        const id = document.getElementById('editId').value;
        if (!id) return;

        const updatedData = {
          nama_data: document.getElementById('editNama').value,
          harga_data: document.getElementById('editHarga').value,
          no_res: document.getElementById('editNoRes').value,
          no_pesanan: document.getElementById('editNoPesanan').value,
          status_pesanan: document.getElementById('editStatus').value,
          tanggal_pesan: document.getElementById('editTanggal').value,
          updated_at: new Date().toISOString()
        };

        // Show loading state on button
        const saveBtn = document.querySelector('.btn-save');
        const originalContent = saveBtn.innerHTML;
        saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Menyimpan...';
        saveBtn.disabled = true;

        fetch(`https://hams-71af2-default-rtdb.firebaseio.com/data/paket/${id}.json`, {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(updatedData)
        })
        .then(res => {
          if (!res.ok) throw new Error('Update failed');
          return res.json();
        })
        .then(() => {
          editModal.hide();
          showToast('Data berhasil diperbarui');
          loadData(); // Reload to show updated data
        })
        .catch(err => {
          console.error(err);
          showToast('Gagal memperbarui data', 'error');
        })
        .finally(() => {
          saveBtn.innerHTML = originalContent;
          saveBtn.disabled = false;
        });
      }

      // Close modal on escape key
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          editModal?.hide();
        }
      });
    </script>
  </body>
</html>
