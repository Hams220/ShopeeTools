<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feed - ShopeeTools</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #e5e7eb;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Navbar */
    .navbar-custom {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 1rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar-brand {
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      color: #fff !important;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-link {
      color: #cbd5f5 !important;
      transition: 0.3s;
    }

    .nav-link:hover {
      color: #fff !important;
    }

    .user-menu {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #cbd5f5;
      font-size: 0.9rem;
    }

    .btn-logout {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border: none;
      border-radius: 10px;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .btn-logout:hover {
      background: rgba(239, 68, 68, 0.25);
    }

    /* Main Container */
    .main-container {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    /* Create Post Card */
    .create-post-card {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .post-input-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #fff;
      font-weight: 600;
      flex-shrink: 0;
    }

    .post-input-wrapper {
      flex: 1;
    }

    .post-textarea {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 2px solid rgba(51, 65, 85, 0.5);
      border-radius: 16px;
      padding: 1rem 1.25rem;
      color: #fff;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      resize: none;
      min-height: 100px;
      transition: all 0.3s ease;
    }

    .post-textarea:focus {
      outline: none;
      border-color: #3b82f6;
      background: rgba(15, 23, 42, 0.8);
    }

    .post-textarea::placeholder {
      color: #64748b;
    }

    .post-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .post-hint {
      color: #64748b;
      font-size: 0.875rem;
    }

    .btn-post {
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      border: none;
      border-radius: 12px;
      padding: 0.75rem 1.5rem;
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-post:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
    }

    .btn-post:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-post.loading {
      pointer-events: none;
    }

    /* Feed Posts */
    .feed-post {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .post-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      color: #fff;
      font-weight: 600;
      flex-shrink: 0;
    }

    .post-meta {
      flex: 1;
    }

    .post-author {
      font-weight: 600;
      color: #fff;
      font-size: 1rem;
      margin: 0;
    }

    .post-time {
      color: #64748b;
      font-size: 0.875rem;
      margin: 0;
    }

    .post-content {
      color: #e5e7eb;
      font-size: 1rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    /* Clickable Links */
    .post-content a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }

    .post-content a:hover {
      color: #60a5fa;
      text-decoration: underline;
    }

    /* Loading Skeleton */
    .skeleton {
      background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 12px;
    }

    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
    }

    .skeleton-text {
      height: 16px;
      margin-bottom: 8px;
    }

    .skeleton-content {
      height: 80px;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #64748b;
    }

    .empty-state i {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      color: #475569;
    }

    .empty-state h4 {
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }

    .toast-custom {
      background: #1e293b;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      padding: 1rem 1.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 300px;
      transform: translateX(400px);
      transition: transform 0.4s ease;
    }

    .toast-custom.show {
      transform: translateX(0);
    }

    .toast-icon {
      font-size: 1.5rem;
    }

    .toast-icon.success { color: #22c55e; }
    .toast-icon.error { color: #ef4444; }

    /* Responsive */
    @media (max-width: 576px) {
      .main-container {
        padding: 1rem;
      }

      .create-post-card,
      .feed-post {
        padding: 1rem;
      }

      .post-textarea {
        min-height: 80px;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-custom">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <i class="bi bi-box-seam"></i>
        ShopeeTools
      </a>
      
      <div class="d-flex align-items-center gap-3">
        <a href="index.html" class="nav-link">
          <i class="bi bi-house"></i> Home
        </a>
        
        <!-- User Menu -->
        <div class="user-menu" id="userMenu" style="display: none;">
          <div class="user-info">
            <i class="bi bi-person-circle"></i>
            <span id="usernameDisplay">User</span>
          </div>
          <button class="btn-logout" onclick="logout()">
            <i class="bi bi-box-arrow-right"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <div class="main-container">
    
    <!-- Create Post -->
    <div class="create-post-card">
      <div class="post-input-header">
        <div class="avatar" id="currentUserAvatar">U</div>
        <div class="post-input-wrapper">
          <textarea 
            class="post-textarea" 
            id="postContent" 
            placeholder="Apa yang Anda pikirkan?"
            maxlength="1000"
          ></textarea>
        </div>
      </div>
      <div class="post-actions">
        <span class="post-hint">
          <i class="bi bi-link-45deg"></i>
          URL akan otomatis menjadi link
        </span>
        <button class="btn-post" id="btnPost" onclick="createPost()">
          <i class="bi bi-send-fill"></i>
          Posting
        </button>
      </div>
    </div>

    <!-- Loading State -->
    <div id="loadingState">
      <div class="feed-post">
        <div class="post-header">
          <div class="skeleton skeleton-avatar"></div>
          <div style="flex:1">
            <div class="skeleton skeleton-text" style="width: 120px;"></div>
            <div class="skeleton skeleton-text" style="width: 80px;"></div>
          </div>
        </div>
        <div class="skeleton skeleton-content"></div>
      </div>
    </div>

    <!-- Feed Container -->
    <div id="feedContainer" style="display: none;"></div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state" style="display: none;">
      <i class="bi bi-chat-square-text"></i>
      <h4>Belum ada status</h4>
      <p>Jadilah yang pertama memposting!</p>
    </div>

  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const API_URL = "https://hams-71af2-default-rtdb.firebaseio.com/data/feed.json";
    let currentUser = null;

    // Check session on page load
    document.addEventListener('DOMContentLoaded', function() {
      checkSession();
    });

    function checkSession() {
      const session = localStorage.getItem('userSession');
      
      if (!session) {
        window.location.href = 'login.html';
        return;
      }

      try {
        currentUser = JSON.parse(session);
        
        if (!currentUser.isLoggedIn || !currentUser.username) {
          localStorage.removeItem('userSession');
          window.location.href = 'login.html';
          return;
        }

        // Show user menu
        document.getElementById('userMenu').style.display = 'flex';
        document.getElementById('usernameDisplay').textContent = currentUser.username;
        
        // Set avatar initial
        const initial = currentUser.username.charAt(0).toUpperCase();
        document.getElementById('currentUserAvatar').textContent = initial;

        // Load feed
        loadFeed();

      } catch (error) {
        console.error('Session error:', error);
        localStorage.removeItem('userSession');
        window.location.href = 'login.html';
      }
    }

    function logout() {
      if (confirm('Yakin ingin logout?')) {
        localStorage.removeItem('userSession');
        showToast('Berhasil logout', 'success');
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 500);
      }
    }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toastId = 'toast-' + Date.now();

      const icons = {
        success: 'bi-check-circle-fill',
        error: 'bi-x-circle-fill'
      };

      const toastHtml = `
        <div class="toast-custom" id="${toastId}">
          <i class="bi ${icons[type]} toast-icon ${type}"></i>
          <span>${message}</span>
        </div>
      `;

      container.insertAdjacentHTML('beforeend', toastHtml);

      setTimeout(() => {
        document.getElementById(toastId).classList.add('show');
      }, 10);

      setTimeout(() => {
        const toast = document.getElementById(toastId);
        if (toast) {
          toast.classList.remove('show');
          setTimeout(() => toast.remove(), 400);
        }
      }, 3000);
    }

    // Detect URLs and convert to clickable links
    function linkifyText(text) {
      // URL regex pattern
      const urlPattern = /(https?:\/\/[^\s]+)/g;
      
      // Replace URLs with anchor tags
      return text.replace(urlPattern, (url) => {
        // Ensure URL has protocol
        let href = url;
        if (!href.startsWith('http')) {
          href = 'https://' + href;
        }
        
        // Truncate long URLs for display
        let displayUrl = url;
        if (url.length > 50) {
          displayUrl = url.substring(0, 47) + '...';
        }
        
        return `<a href="${href}" target="_blank" rel="noopener noreferrer" title="${url}">${displayUrl}</a>`;
      });
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diff = Math.floor((now - date) / 1000); // seconds

      if (diff < 60) return 'Baru saja';
      if (diff < 3600) return `${Math.floor(diff / 60)} menit yang lalu`;
      if (diff < 86400) return `${Math.floor(diff / 3600)} jam yang lalu`;
      if (diff < 604800) return `${Math.floor(diff / 86400)} hari yang lalu`;
      
      return date.toLocaleDateString('id-ID', {
        day: 'numeric',
        month: 'short',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    async function createPost() {
      const content = document.getElementById('postContent').value.trim();
      const btn = document.getElementById('btnPost');

      if (!content) {
        showToast('Tulis sesuatu dulu!', 'error');
        return;
      }

      if (!currentUser) {
        showToast('Session expired. Silakan login ulang.', 'error');
        return;
      }

      btn.disabled = true;
      btn.classList.add('loading');
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Mengirim...';

      const postData = {
        content: content,
        username: currentUser.username,
        user_id: currentUser.id || currentUser.username,
        created_at: new Date().toISOString(),
        timestamp: Date.now()
      };

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(postData)
        });

        if (!response.ok) throw new Error('Failed to post');

        showToast('Status berhasil diposting!', 'success');
        document.getElementById('postContent').value = '';
        
        // Reload feed
        loadFeed();

      } catch (error) {
        console.error('Error posting:', error);
        showToast('Gagal memposting. Coba lagi.', 'error');
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
        btn.innerHTML = '<i class="bi bi-send-fill"></i> Posting';
      }
    }

    async function loadFeed() {
      document.getElementById('loadingState').style.display = 'block';
      document.getElementById('feedContainer').style.display = 'none';
      document.getElementById('emptyState').style.display = 'none';

      try {
        const response = await fetch(API_URL);
        const data = await response.json();

        document.getElementById('loadingState').style.display = 'none';

        if (!data || Object.keys(data).length === 0) {
          document.getElementById('emptyState').style.display = 'block';
          return;
        }

        renderFeed(data);
        document.getElementById('feedContainer').style.display = 'block';

      } catch (error) {
        console.error('Error loading feed:', error);
        document.getElementById('loadingState').style.display = 'none';
        showToast('Gagal memuat feed', 'error');
      }
    }

    function renderFeed(data) {
      const container = document.getElementById('feedContainer');
      container.innerHTML = '';

      // Convert to array and sort by timestamp (newest first)
      const posts = Object.entries(data)
        .map(([key, value]) => ({ id: key, ...value }))
        .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

      posts.forEach((post, index) => {
        const initial = (post.username || 'U').charAt(0).toUpperCase();
        const timeAgo = formatTime(post.created_at);
        
        // Process content: escape HTML then linkify URLs
        const safeContent = escapeHtml(post.content);
        const linkedContent = linkifyText(safeContent);

        const html = `
          <div class="feed-post" style="animation-delay: ${index * 0.1}s">
            <div class="post-header">
              <div class="post-avatar">${initial}</div>
              <div class="post-meta">
                <h5 class="post-author">${escapeHtml(post.username || 'Unknown')}</h5>
                <p class="post-time">${timeAgo}</p>
              </div>
            </div>
            <div class="post-content">${linkedContent}</div>
          </div>
        `;

        container.innerHTML += html;
      });
    }

    // Auto-resize textarea
    document.getElementById('postContent').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 300) + 'px';
    });

    // Submit on Ctrl+Enter
    document.getElementById('postContent').addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.key === 'Enter') {
        createPost();
      }
    });
  </script>

</body>
</html>
