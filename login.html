<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - ShopeeTools</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #e5e7eb;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 80%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .auth-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }

    .auth-card {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .auth-header {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(139, 92, 246, 0.2) 100%);
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2.5rem;
      color: #fff;
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
    }

    .auth-title {
      font-family: 'Poppins', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .auth-subtitle {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .auth-body {
      padding: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
    }

    .form-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      color: #cbd5f5;
      margin-bottom: 0.75rem;
    }

    .form-label i {
      color: #3b82f6;
    }

    .input-wrapper {
      position: relative;
    }

    .form-control-custom {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 2px solid rgba(51, 65, 85, 0.5);
      border-radius: 14px;
      padding: 1rem 1.25rem;
      padding-left: 3rem;
      color: #fff;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .form-control-custom:focus {
      outline: none;
      border-color: #3b82f6;
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    .form-control-custom::placeholder {
      color: #64748b;
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      font-size: 1.25rem;
      transition: color 0.3s;
    }

    .form-control-custom:focus ~ .input-icon {
      color: #3b82f6;
    }

    .password-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      cursor: pointer;
      font-size: 1.25rem;
      transition: color 0.3s;
      background: none;
      border: none;
      padding: 0;
    }

    .password-toggle:hover {
      color: #3b82f6;
    }

    .btn-auth {
      width: 100%;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      background-size: 200% 200%;
      border: none;
      border-radius: 14px;
      padding: 1.125rem;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 40px -10px rgba(59, 130, 246, 0.6);
      background-position: 100% 0;
    }

    .btn-auth:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .btn-auth.loading {
      pointer-events: none;
    }

    .spinner-border-sm {
      width: 1.25rem;
      height: 1.25rem;
    }

    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .auth-text {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .auth-link {
      color: #3b82f6;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.3s;
    }

    .auth-link:hover {
      color: #8b5cf6;
      text-decoration: underline;
    }

    /* Toggle Forms */
    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Alert/Toast */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }

    .toast-custom {
      background: #1e293b;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      padding: 1rem 1.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 300px;
      transform: translateX(400px);
      transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    .toast-custom.show {
      transform: translateX(0);
    }

    .toast-icon {
      font-size: 1.5rem;
    }

    .toast-icon.success { color: #22c55e; }
    .toast-icon.error { color: #ef4444; }

    .toast-content h6 {
      color: #fff;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .toast-content p {
      color: #94a3b8;
      margin: 0;
      font-size: 0.875rem;
    }

    /* Remember me & Forgot password */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #94a3b8;
      cursor: pointer;
    }

    .remember-me input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #3b82f6;
      cursor: pointer;
    }

    .forgot-link {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 500;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 576px) {
      .auth-container {
        padding: 0.5rem;
      }

      .auth-header {
        padding: 2rem 1.5rem 1.5rem;
      }

      .auth-body {
        padding: 1.5rem;
      }

      .logo-icon {
        width: 70px;
        height: 70px;
        font-size: 2rem;
      }

      .auth-title {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-card">
      
      <!-- Header -->
      <div class="auth-header">
        <div class="logo-icon">
          <i class="bi bi-box-seam"></i>
        </div>
        <h1 class="auth-title" id="authTitle">Welcome Back</h1>
        <p class="auth-subtitle" id="authSubtitle">Sign in to your account</p>
      </div>

      <!-- Login Form -->
      <div class="auth-body">
        <div id="loginForm" class="form-section active">
          <form onsubmit="handleLogin(event)">
            
            <div class="form-group">
              <label class="form-label">
                <i class="bi bi-person"></i>
                Username
              </label>
              <div class="input-wrapper">
                <i class="bi bi-person input-icon"></i>
                <input 
                  type="text" 
                  class="form-control-custom" 
                  id="loginUsername" 
                  placeholder="Enter your username"
                  required
                  autocomplete="username"
                >
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">
                <i class="bi bi-lock"></i>
                Password
              </label>
              <div class="input-wrapper">
                <i class="bi bi-lock input-icon"></i>
                <input 
                  type="password" 
                  class="form-control-custom" 
                  id="loginPassword" 
                  placeholder="Enter your password"
                  required
                  autocomplete="current-password"
                  style="padding-right: 3rem;"
                >
                <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">
                  <i class="bi bi-eye-slash"></i>
                </button>
              </div>
            </div>

            <div class="form-options">
              <label class="remember-me">
                <input type="checkbox" id="rememberMe" checked>
                <span>Remember me</span>
              </label>
              <a href="#" class="forgot-link" onclick="showForgotPassword()">Forgot password?</a>
            </div>

            <button type="submit" class="btn-auth" id="loginBtn">
              <i class="bi bi-box-arrow-in-right"></i>
              Sign In
            </button>

          </form>

          <div class="auth-footer">
            <p class="auth-text">
              Don't have an account? 
              <span class="auth-link" onclick="showSignup()">Sign up</span>
            </p>
          </div>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="form-section">
          <form onsubmit="handleSignup(event)">
            
            <div class="form-group">
              <label class="form-label">
                <i class="bi bi-person"></i>
                Username
              </label>
              <div class="input-wrapper">
                <i class="bi bi-person input-icon"></i>
                <input 
                  type="text" 
                  class="form-control-custom" 
                  id="signupUsername" 
                  placeholder="Choose a username"
                  required
                  autocomplete="username"
                >
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">
                <i class="bi bi-envelope"></i>
                Email
              </label>
              <div class="input-wrapper">
                <i class="bi bi-envelope input-icon"></i>
                <input 
                  type="email" 
                  class="form-control-custom" 
                  id="signupEmail" 
                  placeholder="Enter your email"
                  required
                  autocomplete="email"
                >
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">
                <i class="bi bi-lock"></i>
                Password
              </label>
              <div class="input-wrapper">
                <i class="bi bi-lock input-icon"></i>
                <input 
                  type="password" 
                  class="form-control-custom" 
                  id="signupPassword" 
                  placeholder="Create a password"
                  required
                  minlength="6"
                  autocomplete="new-password"
                  style="padding-right: 3rem;"
                >
                <button type="button" class="password-toggle" onclick="togglePassword('signupPassword', this)">
                  <i class="bi bi-eye-slash"></i>
                </button>
              </div>
              <small style="color: #64748b; font-size: 0.8rem; margin-top: 0.5rem; display: block;">
                Minimum 6 characters
              </small>
            </div>

            <div class="form-group">
              <label class="form-label">
                <i class="bi bi-lock-fill"></i>
                Confirm Password
              </label>
              <div class="input-wrapper">
                <i class="bi bi-lock-fill input-icon"></i>
                <input 
                  type="password" 
                  class="form-control-custom" 
                  id="signupConfirmPassword" 
                  placeholder="Confirm your password"
                  required
                  autocomplete="new-password"
                  style="padding-right: 3rem;"
                >
                <button type="button" class="password-toggle" onclick="togglePassword('signupConfirmPassword', this)">
                  <i class="bi bi-eye-slash"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn-auth" id="signupBtn">
              <i class="bi bi-person-plus"></i>
              Create Account
            </button>

          </form>

          <div class="auth-footer">
            <p class="auth-text">
              Already have an account? 
              <span class="auth-link" onclick="showLogin()">Sign in</span>
            </p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    const API_URL = "https://hams-71af2-default-rtdb.firebaseio.com/data/user.json";

    // Check if already logged in
    window.addEventListener('DOMContentLoaded', () => {
      const session = localStorage.getItem('userSession');
      if (session) {
        const user = JSON.parse(session);
        if (user.isLoggedIn) {
          // Redirect to main page or show logged in state
          showToast('Welcome back, ' + user.username + '!', 'success');
          // window.location.href = 'index.html';
        }
      }
    });

    function showLogin() {
      document.getElementById('loginForm').classList.add('active');
      document.getElementById('signupForm').classList.remove('active');
      document.getElementById('authTitle').textContent = 'Welcome Back';
      document.getElementById('authSubtitle').textContent = 'Sign in to your account';
    }

    function showSignup() {
      document.getElementById('signupForm').classList.add('active');
      document.getElementById('loginForm').classList.remove('active');
      document.getElementById('authTitle').textContent = 'Create Account';
      document.getElementById('authSubtitle').textContent = 'Sign up to get started';
    }

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector('i');
      
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
      } else {
        input.type = 'password';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
      }
    }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toastId = 'toast-' + Date.now();

      const icon = type === 'success' ? 'bi-check-circle-fill' : 'bi-x-circle-fill';
      const title = type === 'success' ? 'Success!' : 'Error!';

      const toastHtml = `
        <div class="toast-custom" id="${toastId}">
          <i class="bi ${icon} toast-icon ${type}"></i>
          <div class="toast-content">
            <h6>${title}</h6>
            <p>${message}</p>
          </div>
        </div>
      `;

      container.insertAdjacentHTML('beforeend', toastHtml);

      // Trigger animation
      setTimeout(() => {
        document.getElementById(toastId).classList.add('show');
      }, 10);

      // Remove after 3 seconds
      setTimeout(() => {
        const toast = document.getElementById(toastId);
        if (toast) {
          toast.classList.remove('show');
          setTimeout(() => toast.remove(), 400);
        }
      }, 3000);
    }

    function setLoading(btnId, isLoading, originalText) {
      const btn = document.getElementById(btnId);
      if (isLoading) {
        btn.disabled = true;
        btn.classList.add('loading');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Loading...';
      } else {
        btn.disabled = false;
        btn.classList.remove('loading');
        btn.innerHTML = originalText;
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      const rememberMe = document.getElementById('rememberMe').checked;

      setLoading('loginBtn', true, '<i class="bi bi-box-arrow-in-right"></i> Sign In');

      try {
        // Fetch users from Firebase
        const response = await fetch(API_URL);
        const users = await response.json();

        let userFound = null;
        let userKey = null;

        // Check if user exists
        if (users) {
          for (const [key, user] of Object.entries(users)) {
            if (user.username === username && user.password === password) {
              userFound = user;
              userKey = key;
              break;
            }
          }
        }

        if (userFound) {
          // Create session
          const session = {
            id: userKey,
            username: userFound.username,
            email: userFound.email,
            isLoggedIn: true,
            loginTime: new Date().toISOString()
          };

          // Save to localStorage
          localStorage.setItem('userSession', JSON.stringify(session));
          
          if (rememberMe) {
            localStorage.setItem('rememberedUsername', username);
          } else {
            localStorage.removeItem('rememberedUsername');
          }

          showToast('Login successful! Redirecting...', 'success');
          
          // Redirect after 1.5 seconds
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1500);

        } else {
          showToast('Invalid username or password', 'error');
        }

      } catch (error) {
        console.error('Login error:', error);
        showToast('Connection error. Please try again.', 'error');
      } finally {
        setLoading('loginBtn', false, '<i class="bi bi-box-arrow-in-right"></i> Sign In');
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      
      const username = document.getElementById('signupUsername').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const confirmPassword = document.getElementById('signupConfirmPassword').value;

      // Validation
      if (password !== confirmPassword) {
        showToast('Passwords do not match!', 'error');
        return;
      }

      if (password.length < 6) {
        showToast('Password must be at least 6 characters', 'error');
        return;
      }

      setLoading('signupBtn', true, '<i class="bi bi-person-plus"></i> Create Account');

      try {
        // Check if username already exists
        const checkResponse = await fetch(API_URL);
        const existingUsers = await checkResponse.json();

        if (existingUsers) {
          for (const user of Object.values(existingUsers)) {
            if (user.username === username) {
              showToast('Username already exists!', 'error');
              setLoading('signupBtn', false, '<i class="bi bi-person-plus"></i> Create Account');
              return;
            }
            if (user.email === email) {
              showToast('Email already registered!', 'error');
              setLoading('signupBtn', false, '<i class="bi bi-person-plus"></i> Create Account');
              return;
            }
          }
        }

        // Create new user object
        const newUser = {
          username: username,
          email: email,
          password: password,
          createdAt: new Date().toISOString(),
          lastLogin: new Date().toISOString()
        };

        // Post to Firebase
        const postResponse = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(newUser)
        });

        if (!postResponse.ok) {
          throw new Error('Failed to create account');
        }

        const result = await postResponse.json();
        const userId = result.name;

        // Create session
        const session = {
          id: userId,
          username: username,
          email: email,
          isLoggedIn: true,
          loginTime: new Date().toISOString()
        };

        // Save to localStorage
        localStorage.setItem('userSession', JSON.stringify(session));

        showToast('Account created successfully!', 'success');

        // Redirect after 1.5 seconds
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);

      } catch (error) {
        console.error('Signup error:', error);
        showToast('Failed to create account. Please try again.', 'error');
      } finally {
        setLoading('signupBtn', false, '<i class="bi bi-person-plus"></i> Create Account');
      }
    }

    function showForgotPassword() {
      showToast('Please contact admin to reset your password', 'success');
    }

    // Load remembered username
    window.addEventListener('DOMContentLoaded', () => {
      const remembered = localStorage.getItem('rememberedUsername');
      if (remembered) {
        document.getElementById('loginUsername').value = remembered;
      }
    });
  </script>

</body>
</html>
